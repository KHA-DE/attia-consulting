<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ATTIA Consulting</title>
<meta name="description" content="ATTIA Consulting — unabhängige Strategieberatung an der Schnittstelle von Anwendung und Technik. Seit 1989.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Expanded:wght@600;700;800;900&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap');

:root{
  --ac-ink:#111111; --ac-ink-soft:#3A3A3C; --ac-ink-muted:#6E6E73;
  --ac-paper:#FFFFFF; --ac-paper-warm:#F7F5F2; --ac-paper-sink:#EFEDE8;
  --ac-red:#BC0710; --ac-red-deep:#8C040B; --ac-red-tint:#ECEDEE;
  --ac-line:#E3E0DA; --ac-line-strong:#C9C5BD; --ac-graphite:#1C1C1E;
  --text-ondark:#F3F1EC;
  --font-display:'Archivo Expanded','Archivo',system-ui,sans-serif;
  --font-sans:'Archivo',system-ui,-apple-system,sans-serif;
  --font-serif:'Spectral',Georgia,'Times New Roman',serif;
  --text-2xs:.75rem; --text-3xs:.6875rem; --text-sm:.9375rem; --text-base:1rem; --text-3xl:3rem;
  --ls-label:.14em;
  --radius-sm:2px; --radius-md:4px;
  --space-6:32px;
  --shadow-card:0 1px 3px rgba(17,17,17,.05),0 8px 28px rgba(17,17,17,.06);
  --shadow-lg:0 18px 48px rgba(17,17,17,.12);
  --md-ease:cubic-bezier(.4,0,.2,1); --ease-out:cubic-bezier(.22,1,.36,1);
  --dur-fast:140ms; --dur-base:240ms; --dur-slow:420ms;
  --md-e2:0 2px 6px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.08);
  --md-e6:0 8px 24px rgba(0,0,0,.18),0 4px 8px rgba(0,0,0,.10);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:var(--font-sans);color:var(--ac-ink);background:var(--ac-paper);overflow-x:hidden}
a{color:var(--ac-red);text-decoration:none}
a:hover{color:var(--ac-red-deep)}
.wrap{max-width:1160px;margin:0 auto;padding:0 40px}

/* logo wordmark */
.logo{display:inline-flex;align-items:center;gap:12px}
.logo-mark{height:45px;display:block}
.logo-word{display:flex;flex-direction:column;line-height:.9;font-family:var(--font-display);font-weight:900;letter-spacing:-.02em}
.logo-word .lw1{color:var(--ac-ink);font-size:30px}
.logo-word .lw2{color:var(--ac-red);font-family:var(--font-sans);font-weight:700;font-size:18px;letter-spacing:0;margin-top:1px}
.footer-word .lw1{color:#fff;font-size:26px}
.footer-word .lw2{font-size:16px}

/* buttons */
.btn{font-family:var(--font-sans);font-weight:600;letter-spacing:.01em;border-radius:var(--radius-md);cursor:pointer;border:1.5px solid transparent;display:inline-flex;align-items:center;justify-content:center;gap:8px;line-height:1;transition:background var(--dur-fast) var(--ease-out),color var(--dur-fast),border-color var(--dur-fast)}
.btn-sm{padding:8px 16px;font-size:var(--text-2xs)}
.btn-lg{padding:15px 30px;font-size:var(--text-base)}
.btn-primary{background:var(--ac-red);color:#fff}
.btn-primary:hover{background:var(--ac-red-deep)}
.btn-outline{background:transparent;color:#fff;border-color:rgba(255,255,255,.4)}
.btn-outline:hover{border-color:#fff}

/* eyebrow / tags */
.eyebrow{display:inline-block;font-family:var(--font-sans);font-size:var(--text-2xs);font-weight:700;letter-spacing:var(--ls-label);text-transform:uppercase;color:var(--ac-ink);padding-bottom:6px;border-bottom:3px solid var(--ac-red)}
.eyebrow.light{color:var(--text-ondark)}
.tag{display:inline-flex;align-items:center;font-family:var(--font-sans);font-size:var(--text-3xs);font-weight:700;letter-spacing:var(--ls-label);text-transform:uppercase;padding:5px 10px;border-radius:var(--radius-sm)}
.tag.neutral{background:var(--ac-paper-sink);color:var(--ac-ink-soft)}
.tag.red{background:var(--ac-red-tint);color:var(--ac-red-deep)}

/* header */
header{position:sticky;top:0;z-index:50;background:var(--ac-paper);border-bottom:1px solid var(--ac-line);transition:box-shadow var(--dur-base) var(--md-ease)}
header[data-elevated="true"]{box-shadow:var(--md-e2)}
.nav{display:flex;align-items:center;justify-content:space-between;height:76px}
.nav .links{display:flex;gap:30px;align-items:center}
.nav .links a{color:var(--ac-ink);font-size:14px;font-weight:600;letter-spacing:.01em}
.nav .links a:hover{color:var(--ac-red)}
.lang{display:flex;border:1px solid var(--ac-line-strong);border-radius:999px;overflow:hidden;font-size:12px;font-weight:700}
.lang button{border:none;background:none;padding:5px 11px;cursor:pointer;color:var(--ac-ink-muted);font-weight:700;font-family:var(--font-sans)}
.lang button[data-on="true"]{background:var(--ac-ink);color:#fff}
.burger{display:none;flex-direction:column;justify-content:center;gap:5px;width:44px;height:44px;padding:11px;border:none;background:none;cursor:pointer}
.burger span{display:block;height:2px;width:100%;background:var(--ac-ink);border-radius:2px;transition:transform var(--dur-base) var(--md-ease),opacity var(--dur-fast)}
.burger[data-open="true"] span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.burger[data-open="true"] span:nth-child(2){opacity:0}
.burger[data-open="true"] span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

/* hero */
.hero{background:var(--ac-graphite);color:#fff;position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;right:-120px;top:-40px;width:620px;height:620px;background:url('assets/attia-logo.png') center/contain no-repeat;filter:invert(1) grayscale(1);mix-blend-mode:screen;opacity:.15}
.hero .wrap{padding-top:104px;padding-bottom:112px;position:relative;z-index:1}
.hero h1{font-family:var(--font-display);font-weight:900;font-size:74px;line-height:1;letter-spacing:-.03em;margin:24px 0 0;max-width:920px}
.hero h1 em{color:var(--ac-red);font-style:normal}
.hero .sub{font-family:var(--font-serif);font-size:21px;line-height:1.5;color:var(--text-ondark);margin-top:24px;max-width:600px}
.hero .cta{display:flex;gap:14px;margin-top:36px}

/* sections */
section{padding:92px 0}
.shead{display:flex;flex-direction:column;gap:16px;margin-bottom:44px;max-width:720px}
.shead h2{font-family:var(--font-display);font-weight:900;font-size:42px;line-height:1.04;letter-spacing:-.02em;margin:0}
.shead p{font-family:var(--font-serif);font-size:18px;line-height:1.6;color:var(--ac-ink-soft);margin:0}
.svc{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.card{background:var(--ac-paper);border:1px solid var(--ac-line);border-radius:var(--radius-md);padding:var(--space-6);box-shadow:var(--shadow-card);transition:box-shadow var(--dur-base) var(--ease-out),transform var(--dur-base) var(--ease-out)}
.card-accent{border-top:3px solid var(--ac-red)}
.svc-card{cursor:pointer}
.svc-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.svc .n{font-family:var(--font-display);font-weight:900;font-size:22px;color:var(--ac-red)}
.svc h3{font-size:21px;font-weight:700;letter-spacing:-.01em;margin:14px 0 10px}
.svc p{font-family:var(--font-serif);font-size:15px;line-height:1.6;color:var(--ac-ink-soft);margin:0}
.svc .more{overflow:hidden;max-height:0;opacity:0;padding-top:0;transition:max-height var(--dur-slow) var(--md-ease),opacity var(--dur-base),padding-top var(--dur-base);font-size:14px;line-height:1.6;color:var(--ac-ink-muted);border-top:1px solid var(--ac-line);margin-top:16px}
.svc-card.open .more{max-height:220px;opacity:1;padding-top:16px}
.svc .hint{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ac-red);margin-top:16px;cursor:pointer}

/* stats band */
.band{background:var(--ac-graphite);color:#fff}
.band-sec{padding:70px 0}
.band .stats3{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid rgba(255,255,255,.16)}
.band .scell{padding:30px 30px 34px 0;border-right:1px solid rgba(255,255,255,.12)}
.band .scell:last-child{border-right:none}
.stat-v{font-family:var(--font-display);font-weight:900;line-height:1;font-size:var(--text-3xl);letter-spacing:-.02em;color:#fff}
.stat-l{font-family:var(--font-sans);font-weight:600;margin-top:10px;font-size:var(--text-2xs);letter-spacing:var(--ls-label);text-transform:uppercase;color:var(--text-ondark);border-top:3px solid var(--ac-red);padding-top:8px;display:inline-block}
.band .lists2{display:grid;grid-template-columns:1fr 1fr;margin-top:34px;border-top:1px solid rgba(255,255,255,.14)}
.band .bcol{padding:24px 30px 6px 0;border-right:1px solid rgba(255,255,255,.12)}
.band .bcol:last-child{border-right:none}
.band .bh{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-ondark);border-top:3px solid var(--ac-red);padding-top:10px;display:inline-block}
.band .bcol ul{list-style:none;margin:16px 0 0;padding:0}
.band .bcol li{font-family:var(--font-sans);font-weight:600;font-size:19px;letter-spacing:-.01em;color:#fff;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.1)}
.band .bcol li:last-child{border-bottom:none}

/* about */
.about{display:grid;grid-template-columns:340px 1fr;gap:56px;align-items:center}
.about img{width:100%;border-radius:6px;filter:grayscale(.15)}
.about .q{font-family:var(--font-serif);font-size:26px;line-height:1.42;font-weight:500;letter-spacing:-.01em;margin-top:22px}
.about .q em{color:var(--ac-red);font-style:italic}
.about .role{margin-top:22px;font-size:14px;color:var(--ac-ink-muted)}
.about .role b{color:var(--ac-ink);font-weight:700;display:block;font-size:16px}
.about .tags{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}

/* wall */
.wall{background:var(--ac-graphite);color:#fff}
.wall .grid{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid rgba(255,255,255,.13);border-left:1px solid rgba(255,255,255,.13)}
.wall .cell{border-right:1px solid rgba(255,255,255,.13);border-bottom:1px solid rgba(255,255,255,.13);padding:30px 24px;min-height:118px;display:flex;flex-direction:column;justify-content:center;gap:9px;transition:background var(--dur-base) var(--md-ease)}
.wall .cell:hover{background:rgba(255,255,255,.045)}
.wall .cell .nm{font-family:var(--font-sans);font-weight:700;font-size:21px;letter-spacing:-.015em;color:rgba(255,255,255,.6);transition:color var(--dur-base) var(--md-ease);display:flex;align-items:center;gap:9px}
.wall .cell .nm::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--ac-red);transform:scale(0);transition:transform var(--dur-base) var(--md-ease);flex:none}
.wall .cell:hover .nm{color:#fff}
.wall .cell:hover .nm::before{transform:scale(1)}
.wall .cell .nt{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.4)}
.wall .shead h2{color:#fff}
.wall .shead p{color:var(--text-ondark)}

/* contact */
.contact{background:var(--ac-paper-warm);border-top:1px solid var(--ac-line)}
.cgrid{display:grid;grid-template-columns:1fr 460px;gap:64px;align-items:start}
.ch{font-family:var(--font-display);font-weight:900;font-size:40px;letter-spacing:-.02em;margin:18px 0 30px}
.cinfo .row{margin-bottom:22px}
.cinfo .k{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ac-ink-muted);margin-bottom:5px}
.cinfo .v{font-size:17px;font-weight:600}
.field{display:flex;flex-direction:column;gap:7px;margin-bottom:18px}
.field label{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ac-ink-muted)}
.field input,.field textarea{font-family:var(--font-sans);font-size:15px;padding:13px 15px;border:1.5px solid var(--ac-line-strong);border-radius:4px;background:#fff;color:var(--ac-ink)}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--ac-red)}
.done{background:#fff;border-top:3px solid var(--ac-red);padding:34px;box-shadow:var(--shadow-card)}
.done h3{font-size:22px;margin:16px 0 8px}
.done p{font-family:var(--font-serif);color:var(--ac-ink-soft);line-height:1.6;margin:0}

/* footer */
footer.site{background:var(--ac-ink);color:#fff;padding:44px 0}
footer.site .row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px}
footer.site .legal{font-size:12px;color:rgba(255,255,255,.55);line-height:1.6}

/* fab */
.fab{position:fixed;right:32px;bottom:32px;z-index:60;width:60px;height:60px;border:none;border-radius:18px;background:var(--ac-red);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:var(--md-e6);cursor:pointer;transform:scale(0) translateY(12px);opacity:0;transition:transform .34s var(--md-ease),opacity .34s var(--md-ease),background var(--dur-fast)}
.fab[data-show="true"]{transform:scale(1) translateY(0);opacity:1}
.fab:hover{background:var(--ac-red-deep)}

@media(max-width:900px){
  .svc,.wall .grid,.band .stats3{grid-template-columns:1fr 1fr}
  .band .scell{border-right:none;padding-right:0}
  .band .lists2{grid-template-columns:1fr}
  .band .bcol{border-right:none;border-bottom:1px solid rgba(255,255,255,.12);padding:22px 0}
  .band .bcol:last-child{border-bottom:none}
  .about,.cgrid{grid-template-columns:1fr}
  .hero h1{font-size:50px}
  .fab{right:20px;bottom:20px}
}
@media(max-width:700px){
  .burger{display:flex}
  .nav{position:relative}
  .nav .links{position:absolute;top:76px;left:0;right:0;flex-direction:column;align-items:stretch;gap:0;background:var(--ac-paper);border-bottom:1px solid var(--ac-line);box-shadow:var(--md-e2);padding:8px 40px 22px;max-height:0;overflow:hidden;opacity:0;pointer-events:none;transition:max-height var(--dur-base) var(--md-ease),opacity var(--dur-base) var(--md-ease)}
  .nav .links[data-open="true"]{max-height:380px;opacity:1;pointer-events:auto}
  .nav .links a{padding:15px 0;font-size:16px;border-bottom:1px solid var(--ac-line)}
  .nav .links .lang{align-self:flex-start;margin-top:16px}
  .nav .links>.btn{margin-top:16px;align-self:flex-start}
  .svc,.wall .grid{grid-template-columns:1fr}
  .hero .cta{flex-direction:column;align-items:stretch}
}
</style>
</head>

const wordmark = cls => `<span class="logo-word ${cls||''}"><span class="lw1">ATTIA</span><span class="lw2">Consulting</span></span>`;

function view(lang){
  const t = T[lang];
  return `

      <button class="btn btn-lg btn-outline" data-scroll="leistungen">${t.heroCta[1]}</button>
    </div>
  </div></div>

  <section id="leistungen"><div class="wrap">
    <div class="shead"><span class="eyebrow">${t.svcEy}</span><h2>${t.svcH}</h2><p>${t.svcSub}</p></div>

      <div class="card card-accent svc-card">
        <div class="n">${s[0]}</div><h3>${s[1]}</h3><p>${s[2]}</p>
        <div class="more">${s[3]}</div>
        <div class="hint">${t.more} ▾</div>

    </div>

  <div class="band" id="profil"><section class="band-sec"><div class="wrap">
    <div class="stats3">${t.stats3.map(s=>`<div class="scell"><div class="stat-v">${s[0]}</div><div class="stat-l">${s[1]}</div></div>`).join('')}</div>
    <div class="lists2">
      <div class="bcol"><div class="bh">${t.bandWaves}</div><ul>${t.waves.map(w=>`<li>${w}</li>`).join('')}</ul></div>
      <div class="bcol"><div class="bh">${t.bandIndustries}</div><ul>${t.industries.map(w=>`<li>${w}</li>`).join('')}</ul></div>
    </div>
  </div></section></div>

  <section id="ueber"><div class="wrap about">
    <img src="assets/karim-attia.jpg" alt="Karim H. Attia">
    <div>
      <span class="eyebrow">${t.aboutEy}</span>
      <div class="q">${esc(t.aboutQ[0])}<em>${esc(t.aboutQ[1])}</em>${esc(t.aboutQ[2])}</div>
      <div class="role"><b>${t.aboutRole[0]}</b>${t.aboutRole[1]}</div>
      <div class="tags">${t.tags.map((x,i)=>`<span class="tag ${i===0?'red':'neutral'}">${x}</span>`).join('')}</div>
    </div>
  </div></section>

  <div class="wall"><section id="netzwerk"><div class="wrap">
    <div class="shead"><span class="eyebrow light">${t.wallEy}</span><h2>${t.wallH}</h2><p>${t.wallSub}</p></div>
    <div class="grid">${WALL.map(w=>`<div class="cell"><div class="nm">${w.n}</div><div class="nt">${w[lang]}</div></div>`).join('')}</div>
  </div></section></div>

  <div class="contact" id="kontakt"><section><div class="wrap cgrid">
    <div class="cinfo">
      <span class="eyebrow">${t.cEy}</span>
      <h2 class="ch">${t.cH}</h2>
      <div class="row"><div class="k">${t.cLabels[0]}</div><div class="v">+49 172 4235533</div></div>
      <div class="row"><div class="k">${t.cLabels[1]}</div><div class="v"><a href="mailto:karim@attia.consulting">karim@attia.consulting</a></div></div>
      <div class="row"><div class="k">${t.cLabels[2]}</div><div class="v">Gorch-Fock-Haus · Breite Straße 159 · 22767 Hamburg</div></div>
    </div>
    <form class="cform" novalidate>
      <div class="field"><label>${t.cLabels[3]}</label><input name="name" placeholder="${t.cPlace[0]}"></div>
      <div class="field"><label>${t.cLabels[1]}</label><input name="email" type="email" placeholder="${t.cPlace[1]}"></div>
      <div class="field"><label>${t.cLabels[4]}</label><textarea name="msg" rows="4" placeholder="${t.cPlace[2]}"></textarea></div>
      <button type="submit" class="btn btn-lg btn-primary">${t.cLabels[5]}</button>

  </div></section></div>

  <footer class="site"><div class="wrap row">
    ${wordmark('footer-word')}
    <div class="legal">ATTIA Consulting · Gorch-Fock-Haus · Breite Straße 159 · 22767 Hamburg · USt-IdNr. DE247412700<br>Geschäftsführer: Karim H. Attia · © 2026</div>
  </div></footer>

  <button class="fab" data-show="false" data-scroll="kontakt" aria-label="Kontakt">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v12H5.2L4 18.4V4z"/></svg>
  </button>`;
}

const root = document.getElementById('root');
let lang = 'de';

function mount(){
  document.documentElement.lang = lang;
  root.innerHTML = view(lang);
  const t = T[lang];

  root.querySelector('.burger').addEventListener('click', e=>{
    const b=e.currentTarget, links=root.querySelector('.links');
    const open = b.getAttribute('data-open')!=='true';
    b.setAttribute('data-open',open); b.setAttribute('aria-expanded',open);
    links.setAttribute('data-open',open);
  });
  root.querySelectorAll('[data-lang]').forEach(btn=>btn.addEventListener('click',()=>{ lang=btn.getAttribute('data-lang'); mount(); }));
  root.querySelectorAll('[data-scroll]').forEach(el=>el.addEventListener('click',()=>{
    const target=document.getElementById(el.getAttribute('data-scroll'));
    const links=root.querySelector('.links'), burger=root.querySelector('.burger');
    links.setAttribute('data-open','false'); burger.setAttribute('data-open','false');
    if(target) target.scrollIntoView({behavior:'smooth'});
  }));
  root.querySelectorAll('.links a').forEach(a=>a.addEventListener('click',()=>{
    root.querySelector('.links').setAttribute('data-open','false');
    root.querySelector('.burger').setAttribute('data-open','false');
  }));
  root.querySelectorAll('.svc-card').forEach(c=>c.addEventListener('click',()=>{
    const open=c.classList.toggle('open');
    c.querySelector('.hint').textContent = (open?t.less+' ▲':t.more+' ▾');
  }));
  const form=root.querySelector('.cform');
  form.addEventListener('submit',e=>{
    e.preventDefault();
    const name=form.name.value.trim(), email=form.email.value.trim();
    if(!name||!email) return;
    const first=name.split(' ')[0]||'';
    form.outerHTML = `<div class="done"><span class="eyebrow">${t.done[0]}</span><h3>${t.done[1]}, ${esc(first)}.</h3><p>${t.done[2]} ${esc(email)}.</p></div>`;
  });
}

window.addEventListener('scroll', ()=>{
  const h=document.querySelector('header'); if(h) h.setAttribute('data-elevated', window.scrollY>8);
  const f=document.querySelector('.fab'); if(f) f.setAttribute('data-show', window.scrollY>520);
});

mount();
</script>
</body>
</html>
